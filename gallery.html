<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Technology Gallery | Kaustav Mukherjee</title>
    <link rel="icon" id="favicon" type="image/svg+xml" href="assets/img/favicon-light.svg">
    <link rel="apple-touch-icon" id="apple-icon" href="assets/img/favicon-light.svg">
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script src="js/config.js" defer></script>
    <script src="js/data.js" defer></script>
    <script src="js/loader.js" defer></script>
    <script src="js/script.js" defer></script>
    <style>
        .g-hero { padding: 10rem var(--pad) 4rem; }
        .g-title { font-family: var(--serif); font-size: clamp(3rem, 6vw, 6rem); line-height: 1; margin-bottom: 4rem; }
        .g-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 3rem; }
        .g-item { text-decoration: none; color: inherit; display: block; }
        .g-img-wrap { aspect-ratio: 16/10; background: var(--bg2); border: 1px solid var(--line); border-radius: 8px; overflow: hidden; margin-bottom: 1.5rem; transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .g-img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(1); transition: filter 0.4s, transform 0.4s; }
        .g-item:hover .g-img-wrap { transform: translateY(-8px); border-color: var(--brand); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .g-item:hover .g-img { filter: grayscale(0) scale(1.05); }
        .g-meta { display: flex; justify-content: space-between; align-items: flex-start; }
        .g-name { font-family: var(--serif); font-size: 1.5rem; margin-bottom: 0.2rem; transition: color 0.3s; }
        .g-item:hover .g-name { color: var(--brand); }
        .g-type { font-family: var(--mono); font-size: 0.65rem; color: var(--ink3); text-transform: uppercase; }
        .back-link { font-family: var(--mono); font-size: 0.7rem; color: var(--brand); text-decoration: none; display: inline-block; margin-bottom: 2rem; }
    </style>
</head>
<body class="">
    <!-- Preloader -->
    <div class="site-loader" id="siteLoader">
        <div class="loader-text" id="loaderText"></div>
    </div>
    <!-- Custom Cursor -->
    <div class="cur-d" id="cd"></div>
    <div class="cur-r" id="cr"></div>

    <nav id="nav">
        <a href="index.html" class="n-logo" aria-label="Home">
            <div class="logo-circle">
                <svg viewBox="0 0 24 24" fill="currentColor">

                </svg>
            </div>
        </a>
        <ul class="n-links" id="nLinks">
            <li><a href="index.html#what">Work</a></li>
            <li><a href="index.html#projects">Projects</a></li>
            <li><a href="index.html#stack">Stack</a></li>
            <li><a href="index.html#edu">Education</a></li>
            <li><a href="index.html#connect">Connect</a></li>
        </ul>
        <div class="nav-right">
            <div class="tgl-wrap">
                <button class="theme-btn" onclick="toggleTheme()" aria-label="Toggle Theme">
                    <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                    <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                </button>
            </div>
            <!-- Mobile Menu Toggle -->
            <button class="menu-tgl" id="menuTgl" aria-label="Toggle Menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <main class="g-hero">
        <div class="s-inner">
            <a href="index.html" class="back-link">← Home</a>
            <h1 id="catTitle" class="g-title rev">Tech Category</h1>
            <div id="projectGrid" class="g-grid">
                <!-- Dynamic Projects -->
            </div>
        </div>
    </main>

    <footer>
        <div class="f-l rev" id="fCopy">© 2026 <span>Kaustav.Portfolio_V2.0</span></div>
        <div class="f-center">
            <a href="https://kaustavmukherjee.framer.website/" target="_blank" class="f-prev">Portfolio V1.0</a>
        </div>
        <div class="f-r">
            <button class="f-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑ Back to top</button>
        </div>
    </footer>

    <script>
        document.addEventListener('projectsLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const catId = params.get('cat');
            const cat = window.projectData.categories.find(c => c.id === catId);
            
            if (cat) {
                document.getElementById('catTitle').textContent = cat.n + ' Projects';
                const grid = document.getElementById('projectGrid');
                
                // Filter projects by category
                Object.values(window.projectData.projects).forEach(p => {
                    if (p.cat === catId) {
                        const item = document.createElement('a');
                        item.className = 'g-item rev';
                        item.href = `project.html?id=${p.id}`;
                        item.innerHTML = `
                            <div class="g-img-wrap">
                                <img src="${p.img}" alt="${p.t}" class="g-img" loading="lazy">
                            </div>
                            <div class="g-meta">
                                <div>
                                    <div class="g-name">${p.t}</div>
                                    <div class="g-type">${p.type}</div>
                                </div>
                                <div style="font-size: 1.2rem; color: var(--brand)">→</div>
                            </div>
                        `;
                        grid.appendChild(item);
                        if (typeof obs !== 'undefined') obs.observe(item);
                    }
                });
            }
        });
    </script>
</body>
</html>
